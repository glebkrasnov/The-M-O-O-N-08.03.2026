<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>The M O O N</title>

<link rel="apple-touch-icon" sizes="180x180" href="8-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div class="page">

<!-- ВХОД -->

<div class="container" id="login">

<h2>Введи пароль</h2>

<input type="password" id="password" placeholder="Пароль">

<button onclick="checkPassword()">Войти</button>

<p id="error" class="error"></p>

</div>


<!-- ПРИВЕТСТВИЕ -->

<div class="welcome hidden" id="welcome">

<div class="welcome-text">

<span id="typed"></span>

</div>

</div>


<!-- КОНТЕНТ -->

<div class="container hidden" id="vacation">

<h2>С 8 Марта! 🌷</h2>

<div class="congrats-box center-text">

<iframe
class="youtube-video"
src="https://www.youtube-nocookie.com/embed/tn1oAm9PNak"
title="Видео"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

</div>

</div>

<script>

const text = "Добро пожаловать, Екатерина ❤️"

let i = 0

function typeWriter(){

if(i < text.length){

document.getElementById("typed").innerHTML += text.charAt(i)

i++

setTimeout(typeWriter,80)

}

}

function checkPassword(){

const pass = document.getElementById("password").value
const error = document.getElementById("error")

if(pass === "2589"){

document.getElementById("login").classList.add("hidden")

document.getElementById("music").play()

const welcome = document.getElementById("welcome")

welcome.classList.remove("hidden")

typeWriter()

setTimeout(()=>{

welcome.classList.add("fade-out")

},3500)

setTimeout(()=>{

welcome.classList.add("hidden")

document.getElementById("vacation").classList.remove("hidden")

},4500)

}

else{

error.textContent="Неверный пароль"

}

}

</script>

</body>
</html>
