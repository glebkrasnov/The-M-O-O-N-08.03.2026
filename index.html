<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>The M O O N</title>

    <!-- Иконка для iPhone -->
    <link rel="apple-touch-icon" sizes="180x180" href="8-512.png">

    <!-- Открытие как приложение -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <!-- Вход -->
    <div class="container" id="login">
        <h2>Введи пароль</h2>

        <input
            type="password"
            id="password"
            placeholder="Пароль"
        >

        <button onclick="checkPassword()">Войти</button>

        <p id="error" class="error"></p>
    </div>
<!-- ПРИВЕТСТВИЕ -->
<div class="container hidden" id="welcome">
    <h2 id="typingText"></h2>
</div>

    <!-- Сайт в отпуске -->
    <div class="container hidden" id="vacation">
        <h2>С 8 Марта! 🌷</h2>

        <div class="congrats-box center-text">

            <iframe
                class="youtube-video"
                src="https://www.youtube-nocookie.com/embed/tn1oAm9PNak?si=gfQXZEheEw_VpIj2"
                title="Видео"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>

        </div>
    </div>

</div>


<script>

function checkPassword() {

    const pass = document.getElementById('password').value;
    const error = document.getElementById('error');

    if (pass === "2589") {

        document.getElementById('login').classList.add('hidden');

        const welcome = document.getElementById('welcome');
        welcome.classList.remove('hidden');

        typeText("Добро пожаловать, Екатерина!");

        error.textContent = "";

    } else {

        error.textContent = "Неверный пароль";

    }

}


function typeText(text) {

    const element = document.getElementById("typingText");
    let index = 0;

    const interval = setInterval(() => {

        element.textContent += text[index];
        index++;

        if (index === text.length) {

            clearInterval(interval);

            setTimeout(() => {

                document.getElementById("welcome").classList.add("fade-out");

                setTimeout(() => {

                    document.getElementById("welcome").classList.add("hidden");

                    const vacation = document.getElementById("vacation");
                    vacation.classList.remove("hidden");

                }, 800);

            }, 2000);

        }

    }, 70);

}

</script>
</body>
</html>
