<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>The M O O N</title>

<link rel="apple-touch-icon" sizes="180x180" href="8-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

<!-- ВХОД -->

<div class="container" id="login">

<h2>Введи пароль</h2>

<input type="password" id="password" placeholder="Пароль">

<button onclick="checkPassword()">Войти</button>

<p id="error" class="error"></p>

</div>


<!-- ПРИВЕТСТВИЕ -->

<div class="hidden" id="welcome">

<h1 id="typingText"></h1>

</div>


<!-- ВИДЕО -->

<div class="container hidden" id="vacation">

<h2>С 8 Марта! 🌷</h2>

<div class="congrats-box center-text">

<iframe
class="youtube-video"
src="https://www.youtube-nocookie.com/embed/tn1oAm9PNak"
title="Видео"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

</div>

</div>


<script>

function checkPassword(){

const pass=document.getElementById('password').value
const error=document.getElementById('error')

if(pass==="2589"){

document.getElementById('login').classList.add('hidden')

const welcome=document.getElementById('welcome')
welcome.classList.remove('hidden')

showText("Добро пожаловать, Екатерина!")

error.textContent=""

}

else{

error.textContent="Неверный пароль"

}

}


function showText(text){

const element=document.getElementById("typingText")

element.innerHTML=""

;[...text].forEach((letter,i)=>{

const span=document.createElement("span")

span.textContent=letter

span.style.animationDelay=`${i*0.08}s`

element.appendChild(span)

})

setTimeout(()=>{

document.getElementById("welcome").classList.add("fade-out")

setTimeout(()=>{

document.getElementById("welcome").classList.add("hidden")

document.getElementById("vacation").classList.remove("hidden")

},800)

},4000)

}

</script>

</body>
</html>
